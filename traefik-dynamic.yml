tls:
  options:
    default:
      # TLS 1.3 cipher suites are non-configurable and always secure; the list below
      # applies only to 1.2 connections.
      minVersion: VersionTLS12
      cipherSuites:
        - TLS_ECDHE_ECDSA_WITH_AES_128_GCM_SHA256
        - TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256
        - TLS_ECDHE_ECDSA_WITH_AES_256_GCM_SHA384
        - TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384
        - TLS_ECDHE_ECDSA_WITH_CHACHA20_POLY1305_SHA256
        - TLS_ECDHE_RSA_WITH_CHACHA20_POLY1305_SHA256

http:
  middlewares:
    api-headers:
      headers:
        # Tell clients to only contact this host over HTTPS for the next year.
        stsSeconds: 31536000
        stsIncludeSubdomains: true
        stsPreload: true
        # Prevent MIME sniffing on responses.
        contentTypeNosniff: true
        # Suppress indexing — this is an internal API, not a public web resource.
        customResponseHeaders:
          X-Robots-Tag: "noindex, nofollow"
